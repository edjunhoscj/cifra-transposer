<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Transpositor de Cifras</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0ede8;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
.card{background:#fff;border-radius:18px;padding:2rem;width:100%;max-width:640px;box-shadow:0 2px 16px rgba(0,0,0,.08)}
h1{font-size:21px;font-weight:600;color:#1a1a1a;margin:0 0 3px}
.sub{font-size:12px;color:#999;margin-bottom:1.5rem}

/* Step indicator */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:1.75rem}
.step{display:flex;flex-direction:column;align-items:center;gap:4px}
.sc{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;border:1.5px solid #e0e0e0;background:#f5f5f5;color:#bbb;transition:all .3s}
.sc.active{background:#fef3e2;border-color:#f9a825;color:#f9a825}
.sc.done{background:#e8f5e9;border-color:#43a047;color:#43a047}
.sl{font-size:11px;color:#bbb;transition:color .3s}
.sl.active{color:#f9a825}
.sl.done{color:#43a047}
.sline{width:50px;height:1px;background:#e0e0e0;margin:0 4px;margin-bottom:18px;transition:background .3s}
.sline.done{background:#43a047}

/* Upload */
.drop{border:1.5px dashed #ccc;border-radius:14px;padding:2.5rem 2rem;text-align:center;cursor:pointer;background:#fafaf8;transition:all .2s}
.drop:hover,.drop.over{border-color:#f9a825;background:#fef9f0}
.drop svg{width:44px;height:44px;stroke:#ccc;margin:0 auto 12px;display:block;transition:stroke .2s}
.drop:hover svg,.drop.over svg{stroke:#f9a825}
.drop p{font-size:14px;font-weight:500;color:#444;margin-bottom:4px}
.drop small{font-size:12px;color:#999}
.link{color:#f9a825;text-decoration:underline;cursor:pointer}
.badges{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:14px}
.badge{font-size:11px;padding:3px 9px;border-radius:6px;background:#fff;border:1px solid #eee;color:#999}

/* Progress */
.pbox{background:#fafaf8;border-radius:12px;padding:1.5rem;border:1px solid #f0ede8}
.prow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.prow .icon{font-size:22px}
.ptitle{font-weight:500;font-size:14px;color:#333}
.psub{font-size:12px;color:#999;margin-top:2px}
.ptrack{height:5px;background:#f0ede8;border-radius:3px;overflow:hidden;margin-bottom:6px}
.pfill{height:100%;background:linear-gradient(90deg,#f9a825,#fb8c00);border-radius:3px;transition:width .4s ease}
.plabel{display:flex;justify-content:space-between}
.plabel span{font-size:11px;color:#bbb}
.pnote{font-size:11px;color:#bbb;margin-top:8px}

/* Key selection */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.ibox{background:#fafaf8;border-radius:10px;padding:.9rem;border:1px solid #f0ede8}
.ibox.hl{background:#fef3e2;border-color:#f9a825;text-align:center}
.ilabel{font-size:11px;color:#999;margin-bottom:3px}
.ival{font-size:13px;font-weight:500;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ival.big{font-size:26px;font-weight:700;color:#f9a825;line-height:1}
.isub{font-size:11px;color:#bbb;margin-top:2px}

.section-lbl{font-size:10px;color:#bbb;letter-spacing:.06em;margin:0 0 5px}
.keys-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:8px}
.kbtn{padding:7px 2px;font-size:10px;border-radius:7px;border:1px solid #e8e8e8;background:#fff;color:#444;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.kbtn:hover{transform:scale(1.07);border-color:#f9a825;color:#f9a825}
.kbtn.sel{border:1.5px solid #f9a825;background:#fef3e2;color:#e65100;font-weight:600}
.kbtn.orig{border-style:dashed;opacity:.6}

/* Source key override */
.src-row{display:flex;gap:6px;align-items:center;margin-bottom:14px;background:#fafaf8;padding:.75rem;border-radius:10px;border:1px solid #f0ede8}
.src-row label{font-size:12px;color:#888;white-space:nowrap}
.src-select{flex:1;padding:6px 8px;border-radius:6px;border:1px solid #e0e0e0;font-size:13px;background:#fff;font-family:inherit;color:#333}

/* Buttons */
.brow{display:flex;gap:8px;margin-top:16px}
.btn{padding:11px 14px;border-radius:9px;border:1px solid #e0e0e0;background:#f5f4f0;color:#666;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:hover{background:#eee}
.btn-primary{flex:1;background:#fef3e2;border-color:#f9a825;color:#e65100;font-weight:500}
.btn-primary:hover{background:#fde9bc}
.btn-primary:disabled{background:#f5f5f5;border-color:#e0e0e0;color:#bbb;cursor:not-allowed}
.btn-green{flex:1;background:#e8f5e9;border-color:#43a047;color:#2e7d32;font-weight:500}
.btn-green:hover{background:#d4edda}
.hint{font-size:12px;color:#bbb;text-align:center;margin-top:6px}

/* Result */
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.res-from{background:#fafaf8;border:1px solid #eee;border-radius:9px;padding:.8rem;text-align:center}
.res-to{background:#e8f5e9;border:1.5px solid #43a047;border-radius:9px;padding:.8rem;text-align:center}
.rkey{font-size:24px;font-weight:700}
.rkey.from{color:#bbb;text-decoration:line-through}
.rkey.to{color:#2e7d32}
.rlabel{font-size:11px;color:#999;margin-bottom:2px}

.preview{background:#fafaf8;border-radius:10px;padding:1rem;margin-bottom:12px;max-height:300px;overflow-y:auto;border:1px solid #f0ede8}
.preview pre{font-size:12px;color:#333;font-family:'Courier New',monospace;white-space:pre-wrap;word-break:break-word;line-height:1.7}

/* Error */
.errbox{margin-top:12px;padding:10px 12px;background:#fce8e6;border-radius:8px;border:1px solid #f28b82;font-size:13px;color:#c5221f}

/* OCR overlay */
.ocr-warn{background:#fff8e1;border:1px solid #ffe082;border-radius:9px;padding:.875rem;margin-top:10px;font-size:12px;color:#6d4c00}

/* Spin animation */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes indeterminate{0%{width:15%;margin-left:0}50%{width:50%;margin-left:25%}100%{width:15%;margin-left:85%}}
.indeterminate{animation:indeterminate 1.4s ease-in-out infinite}

#file-input{display:none}
</style>
</head>
<body>
<div class="card">
  <div style="text-align:center;margin-bottom:1.25rem">
    <div style="font-size:30px;margin-bottom:6px">🎸</div>
    <h1>Transpositor de Cifras</h1>
    <p class="sub">100% offline · sem API · funciona no GitHub Pages</p>
  </div>

  <div class="steps">
    <div class="step"><div class="sc active" id="sc1">📄</div><span class="sl active" id="sl1">Upload</span></div>
    <div class="sline" id="sline1"></div>
    <div class="step"><div class="sc" id="sc2">🎹</div><span class="sl" id="sl2">Tom</span></div>
    <div class="sline" id="sline2"></div>
    <div class="step"><div class="sc" id="sc3">💾</div><span class="sl" id="sl3">Resultado</span></div>
  </div>

  <div id="main"></div>
  <div id="err"></div>
</div>

<input type="file" id="file-input" accept=".pdf"/>

<script>
/* =====================================================
   MOTOR DE TRANSPOSIÇÃO — PURO JAVASCRIPT
   ===================================================== */

const NOTES_SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTES_FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const NOTE_TO_SEMI = {
  'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,
  'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11
};
// Tom alvo prefere bemóis?
const FLAT_KEYS = new Set(['F','Bb','Eb','Ab','Db','Gb','Fm','Bbm','Ebm','Abm','Dbm','Gbm']);

// Regex para um token de acorde válido (sem contexto de linha)
const CHORD_RE = /^([A-G][#b]?)(m(?:aj)?7?|min7?|M7?|maj7?|7|9|11|13|dim7?|aug|sus[24]?|add\d+|6|4|2)?(\([^)]*\))?(\/[A-G][#b]?)?$/;

function noteToSemi(note){ return NOTE_TO_SEMI[note] ?? -1; }

function semiToNote(semi, useFlat){
  semi = ((semi % 12) + 12) % 12;
  return useFlat ? NOTES_FLAT[semi] : NOTES_SHARP[semi];
}

function transposeRoot(root, interval, useFlat){
  const s = noteToSemi(root);
  return s < 0 ? root : semiToNote(s + interval, useFlat);
}

/** Transpõe um único token de acorde preservando qualidade e baixo */
function transposeToken(token, interval, useFlat){
  const m = token.match(/^([A-G][#b]?)([^\/]*)(\/([A-G][#b]?)(.*))?$/);
  if (!m) return token;
  const [, root, quality, , bass, bassExtra=''] = m;
  const newRoot = transposeRoot(root, interval, useFlat);
  if (bass) return newRoot + quality + '/' + transposeRoot(bass, interval, useFlat) + bassExtra;
  return newRoot + quality;
}

/** Verifica se uma linha é uma linha de acordes (>= 55% dos tokens são acordes válidos) */
function isChordLine(line){
  const trimmed = line.trim();
  if (!trimmed || !/^[A-G]/.test(trimmed)) return false;
  const tokens = trimmed.split(/\s+/).filter(Boolean);
  if (!tokens.length) return false;
  const valid = tokens.filter(t => CHORD_RE.test(t)).length;
  return valid / tokens.length >= 0.55;
}

/** Transpõe uma linha de acordes preservando espaçamento exato */
function transposeChordLine(line, interval, useFlat){
  // Substitui cada token de acorde mantendo espaços
  return line.replace(/[A-G][#b]?(?:m(?:aj)?7?|min7?|M7?|maj7?|7|9|11|13|dim7?|aug|sus[24]?|add\d+|6|4|2)?(?:\([^)]*\))?(?:\/[A-G][#b]?)?/g,
    chord => CHORD_RE.test(chord) ? transposeToken(chord, interval, useFlat) : chord);
}

/** Transpõe acordes entre colchetes [Am] no meio da letra */
function transposeBracketChords(line, interval, useFlat){
  return line.replace(/\[([A-G][#b]?[^\]]*)\]/g, (_, chord) => '[' + transposeToken(chord, interval, useFlat) + ']');
}

/** Transpõe o texto completo da cifra */
function transposeCifra(text, fromKey, toKey){
  const fromNote = fromKey.replace(/m$/, '');
  const toNote   = toKey.replace(/m$/, '');
  const interval = ((noteToSemi(toNote) - noteToSemi(fromNote)) + 12) % 12;
  const useFlat  = FLAT_KEYS.has(toKey);

  return text.split('\n').map(line => {
    if (isChordLine(line))       return transposeChordLine(line, interval, useFlat);
    if (/\[[A-G]/.test(line))    return transposeBracketChords(line, interval, useFlat);
    return line;
  }).join('\n');
}

/* =====================================================
   DETECÇÃO DE TOM — HEURÍSTICA SOBRE OS ACORDES
   ===================================================== */

/** Coleta todas as raízes de acordes encontradas na cifra */
function collectChordRoots(text){
  const roots = [];
  for (const line of text.split('\n')){
    if (!isChordLine(line)) continue;
    for (const token of line.trim().split(/\s+/)){
      const m = token.match(/^([A-G][#b]?)/);
      if (m && CHORD_RE.test(token)) roots.push(m[1]);
    }
  }
  return roots;
}

/** Retorna o tom mais provável da cifra */
function detectKey(text){
  const roots = collectChordRoots(text);
  if (!roots.length) return 'C';
  const count = {};
  for (const r of roots) count[r] = (count[r]||0)+1;
  // Peso extra para o primeiro acorde (costuma ser a tônica)
  const firstLine = text.split('\n').find(l => isChordLine(l)) || '';
  const firstChord = firstLine.trim().split(/\s+/)[0];
  const firstRoot  = (firstChord||'').match(/^([A-G][#b]?)/)?.[1];
  if (firstRoot) count[firstRoot] = (count[firstRoot]||0) + 3;

  let best='C', bestCount=0;
  for (const [note, c] of Object.entries(count)){
    if (c > bestCount){ best=note; bestCount=c; }
  }
  // Verifica se a tônica tem versão menor predominante
  const minorCount = roots.filter(r => {
    const line = text.split('\n').find(l => isChordLine(l) && l.includes(best+'m'));
    return !!line;
  }).length;

  return minorCount > 3 ? best+'m' : best;
}

/* =====================================================
   EXTRAÇÃO DE TEXTO — PDF.js + Tesseract OCR
   ===================================================== */

const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/** Converte base64 em Uint8Array */
function b64ToArr(b64){
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return arr;
}

/** Extrai texto via PDF.js preservando layout espacial (agrupa por linha via Y) */
async function extractTextPdfJs(b64){
  const pdf = await pdfjsLib.getDocument({data: b64ToArr(b64)}).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++){
    const page    = await pdf.getPage(i);
    const content = await page.getTextContent();
    const vp      = page.getViewport({scale:1});

    // Agrupa items por linha (Y próximo)
    const items = content.items.filter(it => it.str.trim());
    if (!items.length){ text += '\n'; continue; }

    // Normaliza Y (PDF usa Y de baixo pra cima, invertemos)
    const pageH = vp.height;
    const withY = items.map(it => ({
      str: it.str,
      x:   it.transform[4],
      y:   pageH - it.transform[5],
      w:   it.width
    })).sort((a,b) => a.y - b.y || a.x - b.x);

    // Agrupa em linhas
    const lines = [];
    let cur = [withY[0]];
    for (let j = 1; j < withY.length; j++){
      const prev = cur[cur.length-1];
      if (Math.abs(withY[j].y - prev.y) <= 6){
        cur.push(withY[j]);
      } else {
        lines.push([...cur]);
        cur = [withY[j]];
      }
    }
    lines.push(cur);

    // Reconstrói cada linha com espaçamento
    for (const line of lines){
      const ls = line.sort((a,b) => a.x - b.x);
      let row  = ls[0].str;
      for (let j = 1; j < ls.length; j++){
        const gap    = ls[j].x - (ls[j-1].x + (ls[j-1].w || 0));
        const spaces = gap > 12 ? ' '.repeat(Math.max(1, Math.round(gap/6))) : ' ';
        row += spaces + ls[j].str;
      }
      text += row + '\n';
    }
    text += '\n';
  }
  return {text: text.trim(), pdf};
}

/** Renderiza páginas do PDF como imagens JPEG base64 */
async function renderPagesToImages(pdf, onProgress){
  const total = Math.min(pdf.numPages, 12);
  const images = [];
  for (let i=1; i<=total; i++){
    onProgress(Math.round(30 + (i/total)*50), `Renderizando página ${i}/${total}…`);
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({scale: 2.0});
    const canvas = document.createElement('canvas');
    canvas.width  = viewport.width;
    canvas.height = viewport.height;
    await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
    images.push(canvas.toDataURL('image/jpeg', 0.90));
  }
  return images;
}

/**
 * Reconstrói linhas de texto a partir das bounding boxes das palavras.
 * Agrupa palavras com centros Y próximos na mesma linha e preserva
 * o espaçamento horizontal — essencial para cifras onde acordes ficam
 * acima das sílabas correspondentes.
 */
function reconstructLinesFromWords(words){
  if (!words || !words.length) return '';

  // Filtra palavras com baixa confiança ou vazias
  const valid = words.filter(w => w.confidence > 25 && w.text.trim().length > 0);
  if (!valid.length) return '';

  // Ordena por Y depois por X
  const sorted = [...valid].sort((a,b) => a.bbox.y0 - b.bbox.y0 || a.bbox.x0 - b.bbox.x0);

  // Agrupa em linhas: palavras cujos centros Y estão dentro de 60% da altura de uma palavra
  const lines = [];
  let cur = [sorted[0]];
  for (let i = 1; i < sorted.length; i++){
    const w    = sorted[i];
    const prev = cur[cur.length - 1];
    const prevH    = prev.bbox.y1 - prev.bbox.y0;
    const prevCenY = (prev.bbox.y0 + prev.bbox.y1) / 2;
    const currCenY = (w.bbox.y0   + w.bbox.y1)    / 2;
    if (Math.abs(currCenY - prevCenY) <= prevH * 0.65){
      cur.push(w);
    } else {
      lines.push([...cur]);
      cur = [w];
    }
  }
  lines.push(cur);

  // Para cada linha, reconstrói com espaçamento proporcional
  return lines.map(line => {
    const ls = line.sort((a,b) => a.bbox.x0 - b.bbox.x0);
    let text = ls[0].text;
    for (let i = 1; i < ls.length; i++){
      const gap      = ls[i].bbox.x0 - ls[i-1].bbox.x1;
      const charW    = (ls[i].bbox.x1 - ls[i].bbox.x0) / Math.max(ls[i].text.length, 1);
      const spaces   = Math.max(1, Math.round(gap / Math.max(charW, 6)));
      text += ' '.repeat(spaces) + ls[i].text;
    }
    return text;
  }).join('\n');
}

/**
 * Corrige artefatos comuns de OCR em acordes:
 * "G # m7" → "G#m7", "A # 7" → "A#7", "Bb 7" → "Bb7"
 */
function fixOcrChords(text){
  return text
    // "G # m" → "G#m"  /  "D # m7" → "D#m7"
    .replace(/\b([A-G])\s+#\s*(m(?:aj)?7?|min7?|M7?|maj7?|7|9|11|13|dim7?|aug|sus[24]?|add\d+|6|4|2)?/g,
      (_, n, q) => n + '#' + (q||''))
    // "G b m" → "Gbm"
    .replace(/\b([A-G])\s+b\s*(m(?:aj)?7?|min7?|M7?|maj7?|7|9|11|13|dim7?|aug|sus[24]?|add\d+|6|4|2)?(?=[^a-z]|$)/g,
      (_, n, q) => n + 'b' + (q||''))
    // "Bb 7" → "Bb7", "Am 7" → "Am7"
    .replace(/\b([A-G][#b]?m?)\s+(7|9|11|13|maj7?|min7?|dim7?|sus[24]?)\b/g, '$1$2');
}

/** OCR via Tesseract.js com reconstrução espacial de layout */
async function ocrImages(images, onProgress){
  if (!window.Tesseract){
    onProgress(20, 'Carregando motor OCR (Tesseract.js)…');
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/tesseract.js@5/dist/tesseract.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  const worker = await Tesseract.createWorker('por+eng', 1, {
    logger: m => {
      if (m.status === 'recognizing text')
        onProgress(70 + Math.round(m.progress * 25), `OCR: ${Math.round(m.progress*100)}%…`);
    }
  });
  let allText = '';
  for (const img of images){
    const result = await worker.recognize(img);
    // Usa bounding boxes para reconstruir layout espacial
    const reconstructed = reconstructLinesFromWords(result.data.words);
    allText += fixOcrChords(reconstructed) + '\n\n';
  }
  await worker.terminate();
  return allText.trim();
}

/* =====================================================
   ESTADO & RENDER
   ===================================================== */

const MAJOR_KEYS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const MINOR_KEYS = ['Cm','C#m','Dm','D#m','Em','Fm','F#m','Gm','G#m','Am','A#m','Bm'];
const KEY_LABEL  = {
  'C':'C','C#':'C♯/D♭','D':'D','D#':'D♯/E♭','E':'E','F':'F','F#':'F♯/G♭',
  'G':'G','G#':'G♯/A♭','A':'A','A#':'A♯/B♭','B':'B',
  'Cm':'Cm','C#m':'C♯m','Dm':'Dm','D#m':'D♯m','Em':'Em','Fm':'Fm','F#m':'F♯m',
  'Gm':'Gm','G#m':'G♯m','Am':'Am','A#m':'A♯m','Bm':'Bm'
};

let S = {
  step: 'upload',
  b64: null, pageCount: 0, fileName: '',
  cifraText: '', detectedKey: 'C', srcKey: 'C',
  targetKey: '', transposedText: '',
  progress: {value:0, label:''},
  usedOcr: false
};

function setStep(s){ S.step=s; updateIndicator(); render(); }
function setErr(msg){ document.getElementById('err').innerHTML = msg ? `<div class="errbox">⚠️ ${msg}</div>` : ''; }
function setProgress(value, label){
  S.progress = {value, label};
  const fill  = document.getElementById('pfill');
  const lbl   = document.getElementById('plbl');
  const pct   = document.getElementById('ppct');
  if (fill) fill.style.width = value+'%';
  if (lbl)  lbl.textContent  = label;
  if (pct)  pct.textContent  = value+'%';
}

function updateIndicator(){
  const order = {upload:0,processing:0,select:1,done:2};
  const cur   = order[S.step] ?? 0;
  for (let i=1; i<=3; i++){
    const c = document.getElementById('sc'+i);
    const l = document.getElementById('sl'+i);
    c.className = 'sc' + (i-1<cur?' done': i-1===cur?' active':'');
    l.className = 'sl' + (i-1<cur?' done': i-1===cur?' active':'');
    if (i<3) document.getElementById('sline'+i).className = 'sline'+(i<=cur?' done':'');
  }
}

function h(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(){
  document.getElementById('main').innerHTML = ({
    upload:     renderUpload,
    processing: renderProcessing,
    select:     renderSelect,
    done:       renderDone,
  }[S.step] || renderUpload)();
  bindEvents();
}

/* ---------- UPLOAD ---------- */
function renderUpload(){
  return `
  <div class="drop" id="drop">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
    </svg>
    <p>Arraste a cifra em PDF aqui</p>
    <small>ou <span class="link" id="pick-link">clique para selecionar</span></small>
    <div class="badges">
      <span class="badge">✓ PDF com texto</span>
      <span class="badge">✓ PDF escaneado (OCR)</span>
      <span class="badge">✓ Foto em PDF</span>
    </div>
  </div>`;
}

/* ---------- PROCESSANDO ---------- */
function renderProcessing(){
  return `
  <div class="pbox">
    <div class="prow">
      <span class="icon spin">⏳</span>
      <div>
        <div class="ptitle">${h(S.fileName)}</div>
        <div class="psub" id="plbl-sub">Analisando PDF…</div>
      </div>
    </div>
    <div class="ptrack"><div class="pfill" id="pfill" style="width:${S.progress.value}%"></div></div>
    <div class="plabel"><span id="plbl">${S.progress.label}</span><span id="ppct">${S.progress.value}%</span></div>
    <p class="pnote">🔍 Cada página é renderizada em alta resolução para OCR preciso dos acordes</p>
  </div>`;
}

/* ---------- SELEÇÃO DE TOM ---------- */
function renderSelect(){
  const allKeys = [...MAJOR_KEYS, ...MINOR_KEYS];
  const srcOptions = allKeys.map(k =>
    `<option value="${k}" ${S.srcKey===k?'selected':''}>${KEY_LABEL[k]}</option>`
  ).join('');

  const majorBtns = MAJOR_KEYS.map(k => {
    const isOrig = k===S.srcKey;
    const isSel  = k===S.targetKey;
    return `<button class="kbtn${isSel?' sel':''}${isOrig?' orig':''}" data-key="${k}" title="${isOrig?'Tom original':''}">
      ${KEY_LABEL[k]}${isOrig?'<br><span style="font-size:8px;opacity:.6">atual</span>':''}
    </button>`;
  }).join('');

  const minorBtns = MINOR_KEYS.map(k => {
    const isOrig = k===S.srcKey;
    const isSel  = k===S.targetKey;
    return `<button class="kbtn${isSel?' sel':''}${isOrig?' orig':''}" data-key="${k}" title="${isOrig?'Tom original':''}">
      ${KEY_LABEL[k]}${isOrig?'<br><span style="font-size:8px;opacity:.6">atual</span>':''}
    </button>`;
  }).join('');

  const disabled = !S.targetKey || S.targetKey===S.srcKey;

  return `
  <div class="info-grid">
    <div class="ibox">
      <div class="ilabel">🎵 Cifra</div>
      <div class="ival">${h(S.fileName.replace('.pdf',''))}</div>
      <div class="isub">${S.pageCount} página${S.pageCount!==1?'s':''} · ${S.usedOcr?'OCR aplicado':'texto extraído'}</div>
    </div>
    <div class="ibox hl">
      <div class="ilabel">Tom detectado</div>
      <div class="ival big">${h(S.detectedKey)}</div>
    </div>
  </div>

  <div class="src-row">
    <label>🔧 Corrigir tom de origem:</label>
    <select id="src-sel" class="src-select">${srcOptions}</select>
  </div>

  <p class="section-lbl">TRANSPOR PARA:</p>
  <p class="section-lbl" style="margin-top:8px">MAIORES</p>
  <div class="keys-grid">${majorBtns}</div>
  <p class="section-lbl" style="margin-top:6px">MENORES</p>
  <div class="keys-grid">${minorBtns}</div>

  <div class="brow">
    <button class="btn" id="btn-reset">← Voltar</button>
    <button class="btn btn-primary" id="btn-transp" ${disabled?'disabled':''}>
      🔀 Transpor ${h(S.srcKey)} → ${S.targetKey||'?'}
    </button>
  </div>
  ${disabled ? '<p class="hint">Escolha um tom diferente do original</p>' : ''}
  ${S.usedOcr ? `<div class="ocr-warn">⚠️ OCR utilizado — revise os acordes antes de baixar. Imagens de baixa qualidade podem gerar erros de reconhecimento.</div>` : ''}`;
}

/* ---------- RESULTADO ---------- */
function renderDone(){
  return `
  <div class="res-grid">
    <div class="res-from">
      <div class="rlabel">Tom original</div>
      <div class="rkey from">${h(S.srcKey)}</div>
    </div>
    <div class="res-to">
      <div class="rlabel">Tom transposto</div>
      <div class="rkey to">${h(S.targetKey)} ✓</div>
    </div>
  </div>
  <div class="preview"><pre id="preview-text">${h(S.transposedText)}</pre></div>
  <div class="brow">
    <button class="btn" id="btn-reset" title="Nova cifra">↺ Nova</button>
    <button class="btn" id="btn-back-sel">🔀 Outro tom</button>
    <button class="btn btn-green" id="btn-dl">⬇ Baixar PDF — Tom ${h(S.targetKey)}</button>
  </div>`;
}

/* =====================================================
   EVENTOS
   ===================================================== */

function bindEvents(){
  const $ = id => document.getElementById(id);

  if (S.step==='upload'){
    const drop = $('drop');
    drop?.addEventListener('click', ()=>$('file-input').click());
    $('pick-link')?.addEventListener('click', e=>{ e.stopPropagation(); $('file-input').click(); });
    drop?.addEventListener('dragover', e=>{ e.preventDefault(); drop.classList.add('over'); });
    drop?.addEventListener('dragleave', ()=>drop.classList.remove('over'));
    drop?.addEventListener('drop', e=>{ e.preventDefault(); drop.classList.remove('over'); handleFile(e.dataTransfer.files[0]); });
    $('file-input')?.addEventListener('change', e=>handleFile(e.target.files[0]));
  }

  if (S.step==='select'){
    document.querySelectorAll('.kbtn').forEach(btn=>{
      btn.addEventListener('click', ()=>{ S.targetKey=btn.dataset.key; render(); });
    });
    $('src-sel')?.addEventListener('change', e=>{ S.srcKey=e.target.value; render(); });
    $('btn-reset')?.addEventListener('click', resetAll);
    $('btn-transp')?.addEventListener('click', doTranspose);
  }

  if (S.step==='done'){
    $('btn-reset')?.addEventListener('click', resetAll);
    $('btn-back-sel')?.addEventListener('click', ()=>{ S.targetKey=S.srcKey; setStep('select'); });
    $('btn-dl')?.addEventListener('click', downloadPDF);
  }
}

/* =====================================================
   FLUXO PRINCIPAL
   ===================================================== */

async function handleFile(file){
  if (!file || file.type!=='application/pdf'){ setErr('Envie um arquivo PDF válido.'); return; }
  setErr('');
  S.fileName = file.name;
  S.usedOcr  = false;

  const reader = new FileReader();
  reader.onload = async e => {
    S.b64 = e.target.result.split(',')[1];
    setStep('processing');
    try {
      // 1. Tenta extração de texto com PDF.js
      setProgress(10, 'Lendo estrutura do PDF…');
      const {text: rawText, pdf} = await extractTextPdfJs(S.b64);
      S.pageCount = pdf.numPages;

      // 2. Verifica se o texto extraído tem conteúdo suficiente (cifra real)
      const chordLines = rawText.split('\n').filter(isChordLine);
      const hasEnoughText = chordLines.length >= 2 || rawText.replace(/\s/g,'').length > 80;

      let cifraText = rawText;

      if (!hasEnoughText){
        // 3. Fallback: renderiza páginas → OCR com Tesseract.js
        setProgress(20, 'Texto insuficiente — iniciando OCR…');
        const images = await renderPagesToImages(pdf, setProgress);
        setProgress(70, 'Iniciando reconhecimento de texto (OCR)…');
        cifraText  = await ocrImages(images, setProgress);
        S.usedOcr  = true;
      }

      setProgress(95, 'Detectando tom…');
      S.cifraText   = cifraText;
      S.detectedKey = detectKey(cifraText);
      S.srcKey      = S.detectedKey;
      S.targetKey   = '';
      setProgress(100, 'Pronto!');
      setStep('select');
    } catch(err){
      setErr('Erro ao processar: ' + err.message);
      setStep('upload');
      console.error(err);
    }
  };
  reader.readAsDataURL(file);
}

function doTranspose(){
  if (!S.targetKey || S.targetKey===S.srcKey){ setErr('Escolha um tom diferente do original.'); return; }
  setErr('');
  S.transposedText = transposeCifra(S.cifraText, S.srcKey, S.targetKey);
  setStep('done');
}

function downloadPDF(){
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({unit:'mm', format:'a4'});
  const margin=14, maxW=doc.internal.pageSize.getWidth()-margin*2;
  let y=18;

  // Cabeçalho com info de transposição
  doc.setFont('helvetica','bold');
  doc.setFontSize(8);
  doc.setTextColor(150);
  doc.text(`Tom transposto: ${S.srcKey} → ${S.targetKey}  |  gerado por Transpositor de Cifras`, margin, 10);
  doc.setTextColor(0);

  S.transposedText.split('\n').forEach((line, li)=>{
    if (y>278){ doc.addPage(); y=15; }
    const isTitle   = li===0 && line.trim().length>0;
    const isSection = /^\[.+\]$/.test(line) || /^(Intro|Vers[oa]|Refrão|Ponte|Coda|Solo|Pré-refrão|Bridge)[\s:]/i.test(line);
    doc.setFont('courier', isTitle||isSection?'bold':'normal');
    doc.setFontSize(isTitle?15 : isSection?11 : 10);
    doc.splitTextToSize(line||' ', maxW).forEach(wl=>{
      if (y>278){ doc.addPage(); y=15; }
      doc.text(wl, margin, y);
      y += isTitle?8 : 5.5;
    });
  });

  const name = (S.fileName.replace('.pdf','') || 'cifra').replace(/[^\w\sÀ-ÿ]/g,'').trim();
  doc.save(`${name}_tom_${S.targetKey}.pdf`);
}

function resetAll(){
  S = {step:'upload',b64:null,pageCount:0,fileName:'',cifraText:'',detectedKey:'C',srcKey:'C',targetKey:'',transposedText:'',progress:{value:0,label:''},usedOcr:false};
  document.getElementById('file-input').value='';
  setErr('');
  updateIndicator();
  render();
}

/* Inicializa */
render();
</script>
